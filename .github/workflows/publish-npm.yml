name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm_workflow
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Extract version from tag
        id: tag_version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Replace workspace:* with real versions for publishing
        run: node scripts/prepare-publish.js ${{ steps.tag_version.outputs.version }}

      - name: Publish mermaid-diagram-pan-zoom
        run: npm publish --provenance --access public
        working-directory: mermaid-diagram-pan-zoom
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install plugin dependencies (with real SDK version)
        run: npm install
        working-directory: docusaurus-plugin-mermaid-pan-zoom

      - name: Publish docusaurus-plugin-mermaid-pan-zoom
        run: npm publish --provenance --access public
        working-directory: docusaurus-plugin-mermaid-pan-zoom
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
